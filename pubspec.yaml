name: fd_arch_gen
description: A Clean Architecture code generator for Flutter with support for BLoC, Cubit, Riverpod, and GetX state management.
version: 1.0.0
homepage: https://github.com/Fahadbinfayaz96/fd_arch_gen
repository: https://github.com/Fahadbinfayaz96/fd_arch_gen
license: MIT

environment:
  sdk: ">=3.0.0 <4.0.0"

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

executables:
  fd_arch_gen: fd_arch_gen

dependencies:
  path: ^1.9.0
  args: ^2.4.2
  io: ^1.0.4
  equatable: ^2.0.5
  yaml: ^3.1.2
  dartz: ^0.10.1
  get_it: ^9.2.1
  http: ^1.1.0

dev_dependencies:
  flutter_bloc: ^9.1.1
  flutter_riverpod: ^2.4.0
  get: ^4.7.3
  lints: ^6.0.0
  test: ^1.25.6
